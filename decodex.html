<title>Decodex</title>
<style>
  :root{--ink:#0d1017;--panel:#151a24;--line:#27303f;--text:#e2e8f2;--muted:#8a97ab;--amber:#f2a641;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--ink);color:var(--text);font-family:var(--mono);display:grid;place-items:center;padding:24px}
  .gate{width:min(420px,92vw);text-align:center}
  .mark{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--amber);margin-bottom:14px}
  h1{font-size:44px;margin:0 0 6px;font-weight:800;letter-spacing:-.02em}
  h1 b{color:var(--amber)}
  p.sub{color:var(--muted);font-size:13px;margin:0 0 26px;line-height:1.5}
  form{display:flex;gap:8px}
  input{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:10px;
    padding:12px 14px;font-family:var(--mono);font-size:15px}
  input:focus{outline:2px solid var(--amber);outline-offset:1px}
  button{background:var(--amber);color:var(--ink);border:none;border-radius:10px;padding:12px 18px;
    font-family:var(--mono);font-weight:800;font-size:14px;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .msg{min-height:18px;margin-top:14px;font-size:12.5px;color:#ff7a8a}
  .hint{margin-top:22px;font-size:11px;color:#5d6879;line-height:1.6}
</style>
